<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MiApp Local — Crear usuario</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
      body { display:flex; align-items:center; justify-content:center; min-height:100vh }
    </style>
  </head>
  <body>
    <div class="card" style="max-width:420px;padding:2rem">
      <h1 style="text-align:center;margin-bottom:1.5rem">Crear usuario</h1>
      <form method="post">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flashes">
              {% for category, msg in messages %}
                <li class="flash {{ category }}">{{ msg }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
        
        <label>Usuario * (mínimo 3 caracteres)<br>
          <input type="text" name="username" required minlength="3" autofocus>
        </label>
        
        <label style="margin-top:.75rem">Contraseña  (mínimo 6 caracteres)<br>
          <input type="password" name="password" required minlength="6">
        </label>
        
        <label style="margin-top:.75rem">Confirmar contraseña <br>
          <input type="password" name="confirm_password" required minlength="6">
        </label>
        
        <div style="margin-top:1.2rem">
          <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center">Crear usuario</button>
        </div>
      </form>
      
      <hr style="margin:1rem 0;border:none;border-top:1px solid #eef2f7">
      
      <p class="muted" style="margin:0;font-size:.85rem;text-align:center">
        ¿Ya tienes usuario? <a href="{{ url_for('login') }}" style="color:#2563eb;text-decoration:none;font-weight:600">Inicia sesión</a>
      </p>
    </div>
  </body>
</html>
